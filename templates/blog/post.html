<!DOCTYPE html>
<html>
	<!-- -------------------------------------------------- -->
	<!-- include header -->
	<!-- -------------------------------------------------- -->
	<head>{% include "general/header.html" %}</head>
	<!-- -------------------------------------------------- -->
	<!-- include sidebar -->
	<!-- -------------------------------------------------- -->
	{% include "general/sidebar.html" %}
	<!-- -------------------------------------------------- -->
	<!-- include navbar -->
	<!-- -------------------------------------------------- -->
	<div class="beside-sidebar">
	    {% include "general/navbar.html" %}
	</div>
	<!-- -------------------------------------------------- -->
	<!-- table of contents -->
	<!-- -------------------------------------------------- -->
	{% if !toc.is_empty() %}
	<nav class="blog-toc">
		<p>table of contents</p>
		<ul>
			{% for entry in toc %}
			<li class="toc-h{{ entry.level }}">
				<a href="#{{ entry.id }}">{{ entry.text }}</a>
			</li>
			{% endfor %}
		</ul>
	</nav>
	{% endif %}
	<!-- -------------------------------------------------- -->
	<!-- blog post content -->
	<!-- -------------------------------------------------- -->
	<article class="blog-post">
		<header class="blog-post-header">
			<h1>{{ post_title }}</h1>
			<time class="blog-post-date">{{ date }}</time>
		</header>
		<hr>
		<div class="blog-post-body">
			{{ content|safe }}
		</div>
	</article>
	<br>
	<!-- -------------------------------------------------- -->
	<!-- stylesheets -->
	<!-- -------------------------------------------------- -->
	<link rel="stylesheet" href="/css/std.css">
	<link rel="stylesheet" href="/css/blog.css">
	<!-- -------------------------------------------------- -->
	<!-- anchor link copy-to-clipboard -->
	<!-- -------------------------------------------------- -->
	<script>
		document.querySelectorAll('.anchor-icon').forEach(function(el) {
			el.addEventListener('click', function(e) {
				e.preventDefault();
				e.stopPropagation();
				var url = window.location.href.split('#')[0] + '#' + el.closest('[id]').id;
				navigator.clipboard.writeText(url);
			});
		});
	</script>
</html>
